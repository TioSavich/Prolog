<!DOCTYPE html>
<html lang="en" data-page-id="hermes-console">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Console — Critical Math</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Mono:wght@400;500;600&family=Caveat:wght@400;600&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0d0c08;
  --ink-soft: #1a1812;
  --paper: #f4ead6;
  --paper-warm: #ebdfc5;
  --paper-cool: #ede4cf;
  --gold: #d4a747;
  --gold-deep: #b78930;
  --gold-pale: #f0d68a;
  --gold-glow: rgba(212,167,71,0.18);
  --rust: #c45a3e;
  --teal: #4d8a96;
  --line: #2a2418;
  --line-pale: rgba(13,12,8,0.12);
  --muted: #6a6353;
  --serif: 'Source Serif 4', Georgia, serif;
  --mono: 'IBM Plex Mono', ui-monospace, monospace;
  --hand: 'Caveat', 'Patrick Hand', cursive;
}
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html, body { background: var(--paper); color: var(--ink); font-family: var(--serif); font-size: 16px; -webkit-font-smoothing: antialiased; height: 100%; overflow: hidden; }
body {
  background-image:
    radial-gradient(ellipse 800px 500px at 90% 0%, var(--gold-glow), transparent 70%),
    radial-gradient(ellipse 600px 500px at 0% 100%, rgba(77,138,150,0.05), transparent 70%);
  background-attachment: fixed;
}
body::before {
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0 0.03 0 0 0 0.04 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
  opacity:0.4;
}
button { font: inherit; cursor: pointer; }

/* ─── shell ─── */
.shell {
  position: relative; z-index: 2;
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.8rem 1.4rem;
  border-bottom: 1px solid var(--line-pale);
  background: rgba(244,234,214,0.7); backdrop-filter: blur(8px);
}
.topbar .left { display: flex; align-items: center; gap: 1rem; }
.topbar .home {
  font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--muted); text-decoration: none;
}
.topbar .home:hover { color: var(--ink); }
.topbar .title {
  display: flex; align-items: center; gap: 0.6rem;
  font-family: var(--serif); font-weight: 600; font-size: 1.05rem;
}
.topbar .title .mark {
  width: 32px; height: 32px; background: var(--ink); color: var(--gold);
  border-radius: 50%; display: grid; place-items: center;
}
.topbar .title .mark svg { width: 70%; height: 70%; }
.topbar .title .hand {
  font-family: var(--hand); font-weight: 400; color: var(--gold-deep);
  display: inline-block; transform: rotate(-2deg); font-size: 1.2rem;
}
.topbar .right { display: flex; align-items: center; gap: 0.6rem; }
.disc-toggle {
  display: flex; gap: 2px; background: var(--ink); padding: 3px;
  border-radius: 100px; border: 1px solid var(--ink);
}
.disc-toggle button {
  background: transparent; border: none; color: rgba(244,234,214,0.6);
  font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 0.4rem 0.8rem;
  border-radius: 100px;
}
.disc-toggle button.active { background: var(--gold); color: var(--ink); }

/* ─── main grid ─── */
.main {
  display: grid;
  grid-template-columns: 230px 1fr 380px;
  height: 100%; overflow: hidden;
  transition: grid-template-columns 0.3s ease;
}
.main.no-panel { grid-template-columns: 230px 1fr 0; }

/* ─── sidebar (scenarios) ─── */
.sidebar {
  border-right: 1px solid var(--line-pale);
  padding: 1rem;
  overflow-y: auto;
  background: rgba(235,223,197,0.4);
}
.sidebar .section-label {
  font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--muted); margin: 0.6rem 0.6rem 0.4rem;
}
.scenario {
  display: block; width: 100%;
  background: transparent; border: 1px solid transparent;
  text-align: left; padding: 0.7rem 0.8rem; border-radius: 10px;
  margin-bottom: 0.3rem; color: var(--ink);
  font-family: var(--serif); font-size: 0.92rem; line-height: 1.3;
  transition: all 0.15s;
}
.scenario:hover { background: var(--paper-warm); }
.scenario.active {
  background: var(--ink); color: var(--paper);
  border-color: var(--ink);
  transform: rotate(-0.5deg);
  box-shadow: 2px 2px 0 var(--gold-deep);
}
.scenario .num {
  font-family: var(--mono); font-size: 0.65rem;
  color: var(--gold-deep); letter-spacing: 0.1em;
  display: block; margin-bottom: 0.25rem;
}
.scenario.active .num { color: var(--gold); }
.scenario .title { font-weight: 600; }
.scenario .sub { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; font-style: italic; }
.scenario.active .sub { color: rgba(244,234,214,0.6); }

.sidebar .new-thread {
  margin-top: 1.2rem;
  width: 100%; padding: 0.6rem 0.8rem;
  background: transparent; border: 1px dashed var(--ink);
  border-radius: 10px; font-family: var(--mono); font-size: 0.7rem;
  letter-spacing: 0.08em; color: var(--ink);
}
.sidebar .new-thread:hover { background: var(--paper-warm); }

.sidebar .footer-note {
  margin-top: 1.2rem; padding: 0.7rem 0.8rem;
  font-family: var(--hand); font-size: 1rem; color: var(--muted);
  line-height: 1.3; transform: rotate(-1deg);
}

/* ─── center: chat ─── */
.chat {
  display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}
.chat-head {
  padding: 1rem 1.4rem 0.8rem;
  border-bottom: 1px solid var(--line-pale);
  display: flex; justify-content: space-between; align-items: flex-end;
}
.chat-head .title-block h2 {
  font-family: var(--serif); font-weight: 600; font-size: 1.25rem;
  letter-spacing: -0.01em;
}
.chat-head .title-block h2 em { color: var(--gold-deep); font-weight: 400; }
.chat-head .title-block .meta {
  font-family: var(--mono); font-size: 0.66rem; color: var(--muted);
  letter-spacing: 0.12em; margin-top: 0.2rem; text-transform: uppercase;
}
.chat-head .panel-toggle {
  font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.08em;
  background: transparent; border: 1px solid var(--ink);
  border-radius: 100px; padding: 0.4rem 0.85rem; color: var(--ink);
}
.chat-head .panel-toggle:hover { background: var(--paper-warm); }
.chat-head .panel-toggle.active { background: var(--ink); color: var(--gold); }

.feed {
  flex: 1; overflow-y: auto;
  padding: 1.2rem 1.4rem 1rem;
  scroll-behavior: smooth;
}
.feed::-webkit-scrollbar { width: 8px; }
.feed::-webkit-scrollbar-thumb { background: var(--line-pale); border-radius: 4px; }

.msg {
  display: flex; gap: 0.7rem; margin-bottom: 1rem;
  align-items: flex-start;
  animation: msg-in 0.4s cubic-bezier(0.4,0,0.2,1) both;
}
@keyframes msg-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg .who {
  width: 36px; height: 36px; border-radius: 50%;
  flex-shrink: 0; display: grid; place-items: center;
  font-family: var(--mono); font-size: 0.72rem; font-weight: 600;
}
.msg .who.t { background: var(--paper-warm); color: var(--ink); border: 1.5px solid var(--ink); }
.msg .who.h { background: var(--ink); color: var(--gold); }
.msg .who.h svg { width: 70%; height: 70%; }
.msg .who.h.thinking { animation: think 2.4s ease-in-out infinite; }
.msg .who.h.speaking { animation: speak 0.6s ease-in-out infinite; }
@keyframes think {
  0%,100% { transform: rotate(-1deg) scale(1); }
  50% { transform: rotate(1deg) scale(1.04); }
}
@keyframes speak {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}
.msg .body {
  background: var(--paper); border: 1px solid var(--line-pale);
  border-radius: 14px; padding: 0.8rem 1rem;
  max-width: 78%; font-size: 0.96rem; line-height: 1.55;
}
.msg.h .body { border-color: var(--ink); border-radius: 14px 14px 14px 4px; }
.msg.t .body { border-radius: 14px 14px 4px 14px; background: var(--paper-warm); }
.msg .body em { color: var(--gold-deep); font-style: normal; font-weight: 600; }
.msg .body code {
  font-family: var(--mono); font-size: 0.86em; color: var(--ink);
  background: var(--paper-warm); padding: 0.05rem 0.3rem; border-radius: 4px;
}
.msg.h .body code { background: var(--paper-cool); }
.msg .body .pml-codes {
  display: flex; gap: 0.35rem; margin-top: 0.5rem; flex-wrap: wrap;
}
.msg .body .pml-codes .code {
  font-family: var(--mono); font-size: 0.68rem; padding: 0.15rem 0.45rem;
  border-radius: 4px; letter-spacing: 0.04em;
  background: var(--paper-cool); border: 1px solid var(--line-pale);
}
.msg .body .pml-codes .code[data-m="s"] { background: var(--gold-pale); border-color: var(--gold-deep); color: var(--ink); }
.msg .body .pml-codes .code[data-m="o"] { background: rgba(196,90,62,0.15); border-color: var(--rust); color: var(--rust); }
.msg .body .pml-codes .code[data-m="n"] { background: rgba(77,138,150,0.18); border-color: var(--teal); color: var(--teal); }
.msg .body .panel-cta {
  margin-top: 0.7rem;
  font-family: var(--mono); font-size: 0.7rem;
  background: var(--ink); color: var(--gold); border: none;
  padding: 0.4rem 0.8rem; border-radius: 100px;
  letter-spacing: 0.06em;
}
.msg .body .panel-cta:hover { background: var(--gold); color: var(--ink); }
.msg .body .panel-cta::after { content: ' →'; }

.msg .body .neuro-trace {
  margin-top: 0.6rem; padding-top: 0.5rem;
  border-top: 1px dashed var(--line-pale);
  font-family: var(--mono); font-size: 0.7rem; color: var(--muted);
  display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
}
.shell.discourse-fresh .neuro-trace { display: none; }
.shell.discourse-math .neuro-trace .deep { display: none; }
.neuro-trace .step { background: var(--paper-warm); padding: 0.1rem 0.4rem; border-radius: 3px; }
.neuro-trace .step.deep { background: rgba(77,138,150,0.12); }

/* typing indicator */
.typing { display: inline-flex; gap: 0.2rem; padding: 0.3rem 0.5rem; }
.typing span {
  width: 6px; height: 6px; border-radius: 50%; background: var(--gold-deep);
  animation: typing 1.2s ease-in-out infinite;
}
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes typing {
  0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
  40% { opacity: 1; transform: translateY(-3px); }
}

/* composer */
.composer {
  border-top: 1px solid var(--line-pale);
  padding: 0.9rem 1.4rem 1rem;
  background: rgba(244,234,214,0.7); backdrop-filter: blur(8px);
}
.composer .field {
  display: flex; gap: 0.6rem; align-items: flex-end;
  background: var(--paper); border: 1.5px solid var(--ink);
  border-radius: 18px; padding: 0.6rem 0.6rem 0.6rem 1rem;
}
.composer textarea {
  flex: 1; border: none; background: transparent;
  font: inherit; resize: none; outline: none;
  min-height: 24px; max-height: 120px; line-height: 1.5;
  font-size: 0.96rem;
}
.composer textarea::placeholder { color: var(--muted); font-style: italic; }
.composer .send {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--ink); color: var(--gold); border: none;
  display: grid; place-items: center; font-size: 1.1rem;
}
.composer .send:hover { background: var(--gold); color: var(--ink); }
.composer .composer-meta {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono); font-size: 0.66rem; color: var(--muted);
  letter-spacing: 0.05em; margin-top: 0.5rem; padding: 0 0.3rem;
}
.composer .quick {
  display: flex; gap: 0.3rem; flex-wrap: wrap;
}
.composer .quick button {
  background: var(--paper-warm); border: 1px solid var(--line-pale);
  border-radius: 100px; padding: 0.2rem 0.6rem;
  font-family: var(--mono); font-size: 0.68rem; color: var(--ink);
}
.composer .quick button:hover { background: var(--gold-pale); border-color: var(--gold-deep); }

/* ─── right: panel ─── */
.panel {
  border-left: 1px solid var(--line-pale);
  background: var(--paper-warm);
  overflow-y: auto;
  padding: 1rem 1.1rem 1.4rem;
  position: relative;
}
.main.no-panel .panel { display: none; }
.panel .panel-head {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 0.6rem; border-bottom: 1px solid var(--line-pale);
  margin-bottom: 0.9rem;
}
.panel .panel-head .label {
  font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--gold-deep);
}
.panel .panel-head .close {
  background: transparent; border: 1px solid var(--ink);
  border-radius: 50%; width: 24px; height: 24px;
  display: grid; place-items: center; font-size: 0.85rem;
}
.panel-section { margin-bottom: 1.2rem; }
.panel-section h4 {
  font-family: var(--serif); font-weight: 600; font-size: 1rem;
  margin-bottom: 0.5rem;
}
.panel-section p { font-size: 0.88rem; color: var(--ink-soft); line-height: 1.5; }
.panel-section .sub-label {
  font-family: var(--mono); font-size: 0.62rem; color: var(--muted);
  letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.4rem;
}

/* anticipation list */
.anti-list { display: grid; gap: 0.4rem; }
.anti-row {
  display: grid; grid-template-columns: 56px 1fr auto; gap: 0.6rem;
  align-items: center;
  padding: 0.5rem 0.6rem;
  background: var(--paper); border: 1px solid var(--line-pale);
  border-radius: 8px;
  font-size: 0.85rem;
}
.anti-row .pct { font-family: var(--mono); color: var(--gold-deep); font-weight: 600; }
.anti-row .strat-name { font-family: var(--mono); font-size: 0.78rem; }
.anti-row .who-said { font-size: 0.76rem; color: var(--muted); font-style: italic; }
.anti-row.alert { background: rgba(196,90,62,0.08); border-color: var(--rust); }
.anti-row.alert .pct { color: var(--rust); }
.anti-row .bar {
  grid-column: 1 / -1;
  height: 3px; background: var(--paper-warm); border-radius: 2px;
  margin-top: 0.4rem;
}
.anti-row .bar-fill {
  height: 100%; background: var(--gold-deep); border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}
.anti-row.alert .bar-fill { background: var(--rust); }

/* number line viz */
.numberline {
  background: var(--paper); border: 1px solid var(--line-pale);
  border-radius: 8px; padding: 1rem 0.8rem;
}
.numberline svg { width: 100%; height: auto; display: block; }
.numberline .step-label {
  font-family: var(--mono); font-size: 0.72rem; color: var(--muted);
  margin-top: 0.5rem; text-align: center;
}

/* prolog */
.prolog-block {
  background: var(--ink); color: var(--paper);
  border-radius: 8px; padding: 0.8rem 0.9rem;
  font-family: var(--mono); font-size: 0.78rem; line-height: 1.55;
  overflow-x: auto;
}
.prolog-block .kw { color: var(--gold); }
.prolog-block .com { color: rgba(244,234,214,0.4); font-style: italic; }
.prolog-block .var { color: var(--gold-pale); }
.prolog-block .str { color: #b9d4a8; }

/* misconception graph */
.misc-graph {
  background: var(--paper); border: 1px solid var(--line-pale);
  border-radius: 8px; padding: 0.6rem;
}
.misc-graph svg { width: 100%; height: auto; }

/* talk-moves transcript */
.talk-strip {
  display: grid; gap: 0.4rem;
}
.talk-row {
  display: grid; grid-template-columns: 50px 1fr;
  gap: 0.5rem;
  padding: 0.4rem 0.5rem;
  background: var(--paper); border: 1px solid var(--line-pale);
  border-radius: 6px; font-size: 0.84rem;
}
.talk-row .turn-num { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); }
.talk-row .text { line-height: 1.4; }
.talk-row .codes { display: flex; gap: 0.25rem; margin-top: 0.3rem; flex-wrap: wrap; }
.talk-row .codes .c {
  font-family: var(--mono); font-size: 0.6rem; padding: 0.05rem 0.35rem;
  border-radius: 3px; background: var(--paper-warm);
  border: 1px solid var(--line-pale);
}
.talk-row .codes .c[data-m="s"] { background: var(--gold-pale); border-color: var(--gold-deep); }
.talk-row .codes .c[data-m="o"] { background: rgba(196,90,62,0.15); border-color: var(--rust); color: var(--rust); }
.talk-row .codes .c[data-m="n"] { background: rgba(77,138,150,0.18); border-color: var(--teal); color: var(--teal); }

/* pairing cards */
.pair {
  background: var(--paper); border: 1px solid var(--ink);
  border-radius: 10px; padding: 0.7rem;
  margin-bottom: 0.5rem;
}
.pair .pair-row {
  display: grid; grid-template-columns: 1fr auto 1fr;
  gap: 0.5rem; align-items: center;
}
.pair .student {
  text-align: center; padding: 0.4rem 0.3rem;
  background: var(--paper-warm); border-radius: 6px;
}
.pair .student .name { font-weight: 600; font-size: 0.86rem; }
.pair .student .strat { font-family: var(--mono); font-size: 0.66rem; color: var(--muted); margin-top: 0.15rem; }
.pair .arrow { font-family: var(--hand); font-size: 1.4rem; color: var(--gold-deep); transform: rotate(-3deg); }
.pair .why {
  margin-top: 0.5rem; font-size: 0.8rem; line-height: 1.45;
  color: var(--ink-soft); font-style: italic;
}

/* curric + standards */
.curric-row {
  display: flex; gap: 0.5rem; align-items: baseline;
  padding: 0.4rem 0.5rem;
  border-bottom: 1px dashed var(--line-pale); font-size: 0.82rem;
}
.curric-row .code { font-family: var(--mono); color: var(--gold-deep); font-size: 0.74rem; min-width: 80px; }
.curric-row .desc { color: var(--ink-soft); }

/* questions list */
.q-list .q-row {
  background: var(--paper); border-left: 3px solid var(--gold);
  padding: 0.5rem 0.7rem; margin-bottom: 0.4rem;
  font-size: 0.88rem; line-height: 1.45; font-style: italic;
  border-radius: 0 6px 6px 0;
}
.q-list .q-row .q-tag {
  font-family: var(--mono); font-size: 0.62rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase; font-style: normal;
  margin-bottom: 0.2rem; display: block;
}

/* mobile */
@media (max-width: 920px) {
  .main { grid-template-columns: 1fr; }
  .main.no-panel { grid-template-columns: 1fr; }
  .sidebar, .panel { display: none; }
  .topbar .right .disc-toggle { display: none; }
}

/* TWEAKS PANEL */
#tweaks {
  position: fixed; bottom: 1rem; right: 1rem; z-index: 100;
  background: var(--paper); border: 1.5px solid var(--ink);
  border-radius: 14px; padding: 0.9rem 1rem;
  font-family: var(--mono); font-size: 0.74rem;
  width: 240px; max-width: calc(100vw - 2rem);
  box-shadow: 4px 4px 0 var(--ink);
  display: none;
}
#tweaks.open { display: block; }
#tweaks h5 {
  font-family: var(--serif); font-size: 0.95rem; font-weight: 600;
  margin-bottom: 0.6rem; display: flex; justify-content: space-between;
}
#tweaks h5 button {
  background: transparent; border: 1px solid var(--ink);
  border-radius: 50%; width: 22px; height: 22px;
  font-size: 0.8rem; display: grid; place-items: center;
}
#tweaks .tweak { margin-bottom: 0.7rem; }
#tweaks .tweak .label { font-size: 0.62rem; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 0.25rem; text-transform: uppercase; }
#tweaks .opts { display: flex; flex-wrap: wrap; gap: 0.25rem; }
#tweaks .opts button {
  background: var(--paper-warm); border: 1px solid var(--line-pale);
  border-radius: 100px; padding: 0.2rem 0.55rem; font-family: var(--mono); font-size: 0.7rem;
}
#tweaks .opts button.on { background: var(--ink); color: var(--gold); border-color: var(--ink); }
#tweaks-toggle {
  position: fixed; bottom: 1rem; right: 1rem; z-index: 99;
  background: var(--ink); color: var(--gold); border: none;
  border-radius: 100px; padding: 0.5rem 0.9rem;
  font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.12em;
  text-transform: uppercase;
  box-shadow: 3px 3px 0 var(--gold-deep);
}
</style>
</head>
<body>

  state.scenario = key;

  document.getElementById('panel-label').textContent = s.panelLabel;
  feed.innerHTML = '';
  s.transcript.forEach((m, i) => {
    setTimeout(() => renderMessage(m), i * 220);
  });
  // quick prompts
  const qp = document.getElementById('quick-prompts');
  qp.innerHTML = '';
  s.quickPrompts.forEach(p => {
    const b = document.createElement('button');

    b.addEventListener('click', () => askFollowup(p));
    qp.appendChild(b);
  });
  // panel
  s.panel();
  // active state
  document.querySelectorAll('.scenario').forEach(el => el.classList.toggle('active', el.dataset.scenario === key));
}

// number line generator
function numberlineSVG(steps) {
  const min = 0, max = 70;
  const w = 280, pad = 14, h = 70;
  const x = v => pad + ((v - min) / (max - min)) * (w - 2*pad);
  let path = `<line x1="${pad}" y1="${h-22}" x2="${w-pad}" y2="${h-22}" stroke="#0d0c08" stroke-width="1.2"/>`;
  // ticks every 10
  for (let v = 0; v <= 70; v += 10) {
    path += `<line x1="${x(v)}" y1="${h-26}" x2="${x(v)}" y2="${h-18}" stroke="#0d0c08" stroke-width="1"/>`;
    path += `<text x="${x(v)}" y="${h-6}" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#6a6353">${v}</text>`;
  }
  // jumps
  let prev = 38;
  steps.forEach((s, i) => {
    if (i === 0) {
      path += `<circle cx="${x(s.at)}" cy="${h-22}" r="4" fill="#0d0c08"/>`;
      path += `<text x="${x(s.at)}" y="${h-30}" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#0d0c08">${s.label}</text>`;
      return;
    }
    const cx = (x(prev) + x(s.at)) / 2;
    const ry = 16;
    path += `<path d="M ${x(prev)} ${h-22} Q ${cx} ${h-22-ry*1.6}, ${x(s.at)} ${h-22}" fill="none" stroke="#b78930" stroke-width="1.6"/>`;
    path += `<text x="${cx}" y="${h-22-ry*1.6+2}" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#b78930">${s.label}</text>`;
    path += `<circle cx="${x(s.at)}" cy="${h-22}" r="3.5" fill="#b78930"/>`;
    prev = s.at;
  });
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${path}</svg>`;
}

  const root = document.documentElement;
